<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HopeDeck IA</title>
    <link rel="icon" href="https://i.ibb.co/7Jpq27Dj/Icon.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ff; --bg: #050505; }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: radial-gradient(circle at center, #1a001a 0%, #050505 100%); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.1; background-image: linear-gradient(var(--neon-blue) 1px, transparent 1px), linear-gradient(90deg, var(--neon-blue) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; }
        .screen { display: none; width: 90%; max-width: 450px; background: rgba(0,0,0,0.8); border: 2px solid var(--neon-blue); padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0, 243, 255, 0.3); backdrop-filter: blur(10px); }
        .active { display: block; animation: appear 0.6s ease; }
        @keyframes appear { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }
        h2 { font-family: 'Orbitron', sans-serif; color: var(--neon-blue); text-transform: uppercase; text-align: center; margin-bottom: 20px; text-shadow: 0 0 10px var(--neon-blue); }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid var(--neon-pink); color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { cursor: pointer; background: transparent; color: var(--neon-blue); font-weight: bold; text-transform: uppercase; border: 1px solid var(--neon-blue); transition: 0.3s; }
        button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }
        #media-container { position: fixed; bottom: 20px; left: 20px; width: 100px; height: 100px; z-index: 9999; border: 2px solid var(--neon-pink); border-radius: 50%; overflow: hidden; background: #000; }
        #m-img, #m-vid { width: 100%; height: 100%; object-fit: cover; }
        #dialog-text { min-height: 100px; font-size: 1.2rem; color: var(--neon-pink); text-shadow: 0 0 5px var(--neon-pink); margin: 20px 0; border-left: 3px solid var(--neon-blue); padding-left: 15px; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div id="media-container">
        <img id="m-img" src="1.png" style="display:block;">
        <video id="m-vid" src="gif.mp4" style="display:none;" autoplay muted loop></video>
    </div>
    
    <div id="login" class="screen active">
        <h2>ACCESO AL SISTEMA</h2>
        <input type="email" id="l-email" placeholder="CORREO ELECTRÓNICO">
        <input type="password" id="l-pass" placeholder="CONTRASEÑA">
        <button onclick="showScreen('dashboard')">ENTRAR</button>
        <p onclick="showScreen('registro')" style="text-align:center; cursor:pointer; opacity:0.6">¿Eres nuevo? Regístrate</p>
    </div>

    <div id="registro" class="screen">
        <h2>REGISTRO DE USUARIO</h2>
        <input type="text" id="r-nombre" placeholder="NOMBRE">
        <input type="text" id="r-apellido" placeholder="APELLIDO">
        <input type="tel" id="r-tel" placeholder="TELÉFONO">
        <input type="email" id="r-email" placeholder="CORREO">
        <select id="r-anio"><option>1er Año</option><option>2do Año</option><option>3er Año</option><option>4to Año</option><option>5to Año</option></select>
        <input type="password" id="r-pass" placeholder="CONTRASEÑA">
        <button onclick="enviarCodigo()">VERIFICAR CORREO</button>
    </div>

    <div id="verificacion" class="screen">
        <h2>VERIFICACIÓN</h2>
        <input type="text" id="r-codigo" placeholder="INGRESA EL CÓDIGO">
        <button onclick="validarCodigo()">ACTIVAR CUENTA</button>
    </div>

    <div id="presentacion" class="screen">
        <h2>IA ESCOLAR PRO</h2>
        <div id="dialog-text">Bienvenido, Soy la IA encargada de guiarte.</div>
        <button onclick="siguiente()">CONTINUAR</button>
    </div>

    <div id="dashboard" class="screen">
        <h2>PANEL DE CONTROL</h2>
        <button onclick="showScreen('form')">CREAR NUEVO TRABAJO</button>
    </div>

    <div id="form" class="screen">
        <h2>SOLICITUD</h2>
        <select id="f-materia"><option>Matemáticas</option><option>GHC</option><option>Arte y Patrimonio (Solo 1er/2do Año)</option><option>Química</option><option>Mensaje de Dios</option><option>Inglés</option><option>Grupo de Interes</option><option>Orientación y Convivencia</option></select>
        <select id="f-pref"><option>App (2 - 4$)</option><option>Web (2 - 3.5$)</option><option>App + Web (3 - 6$)</option></select>
        <select id="f-tipo" onchange="checkG()"><option>Individual</option><option>Pareja</option><option>Grupo</option></select>
        <div id="g-extra" style="display:none"><input type="number" id="g-num" placeholder="¿Cuántos integrantes?" oninput="genCampos()"></div>
        <div id="campos-g"></div>
        <textarea id="f-asunto" placeholder="¿De qué tratará la diapositiva?"></textarea>
        <input type="date" id="f-fecha">
        <button onclick="enviar()">ENVIAR SOLICITUD</button>
    </div>

    <div id="final" class="screen">
        <h2>¡Muchas Gracias!</h2>
        <p>Su solicitud ha sido procesada.</p>
        <button onclick="showScreen('dashboard')">VOLVER AL INICIO</button>
    </div>

    <script>
        (function(){ emailjs.init("LdDwSQldvAHnEeMj8"); })();
        const msgs = ["Te explicaré para qué sirve la web.","Esta web te ayudará en generar: Tareas y/o Diapositivas.","Las diapositivas puedes decidir qué modo quieres obtenerlas (todos generan imágenes).","Modo App: Crea App interactiva (apk, exe, 3D, juegos).","Modo Web: Diapositivas en línea sin descargar nada.","Modo Web + App: Están vinculadas, ruletas, premiaciones y comunicación interactiva.","¿Para qué tus datos? Para guardar historial, evitar pagos dobles y programar tu entrega.","¡Disfruta!"];
        let idx = 0, cod = "";
        setInterval(()=>{ document.getElementById('m-img').style.display = document.getElementById('m-img').style.display==='block'?'none':'block'; document.getElementById('m-vid').style.display = document.getElementById('m-vid').style.display==='block'?'none':'block'; }, 5000);
        function showScreen(id){ document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function siguiente(){ if(idx < msgs.length){ document.getElementById('dialog-text').innerText = msgs[idx++]; } else { showScreen('dashboard'); } }
        function checkG(){ document.getElementById('g-extra').style.display = document.getElementById('f-tipo').value === 'Grupo' ? 'block' : 'none'; }
        function genCampos(){ const n = document.getElementById('g-num').value; let c = document.getElementById('campos-g'); c.innerHTML = ""; for(let i=0; i<n; i++) c.innerHTML += `<input type="text" class="int" placeholder="Nombre integrante ${i+1}">`; }
        async function enviarCodigo(){ cod = Math.floor(1000+Math.random()*9000); await emailjs.send("service_0bhm81r", "template_siexuuh", {email: document.getElementById('r-email').value, codigo: cod}); showScreen('verificacion'); }
        function validarCodigo(){ if(document.getElementById('r-codigo').value == cod) showScreen('presentacion'); else alert("Código Incorrecto"); }
        async function enviar(){ 
            let ints = ""; document.querySelectorAll('.int').forEach(i => ints += i.value + ", ");
            await emailjs.send("service_0bhm81r", "template_ww9l6pg", { nombre: document.getElementById('r-nombre').value + " " + document.getElementById('r-apellido').value, telefono: document.getElementById('r-tel').value, email: document.getElementById('r-email').value, anio: document.getElementById('r-anio').value, materia: document.getElementById('f-materia').value, asunto: document.getElementById('f-asunto').value, integrantes: ints, fecha: document.getElementById('f-fecha').value }); showScreen('final'); 
        }
    </script>
</body>
</html>
